services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: wa_mining
      POSTGRES_PASSWORD: wa_mining
      POSTGRES_DB: wa_mining
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_mining"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://wa_mining:wa_mining@db:5432/wa_mining
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - ./DATABASES:/workspace/DATABASES:ro

volumes:
  pg_data:
